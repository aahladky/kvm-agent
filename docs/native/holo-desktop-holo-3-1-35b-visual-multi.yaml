# Forest Local Desktop Agent - Structured Output, Multiple Tool Calls

agp-deploy:
  publish_identifier: holo_desktop_holo3_1_35b_multi_2026_06_12
  name: "Holo Desktop Holo3.1 35B Multi"
  description: "Holo desktop agent powered by Holo3.1 35B, batching multiple tool calls per step."
  extras: []

# Served from the production gateway (api.hcompany.ai) — the runtime entrypoint
# defaults HAI_BASE_URL there; the hai_adapters fallback (api.training) does not
# serve this model.
model: holo3-1-35b-a3b
max_steps: 200
max_time_s: 3600
max_images: 3
# PARITY (legacy holo-desktop `Holo` / cua_visual): no LLM memory compressor.
# The local desktop path keeps only the last `max_images` screenshots; adding a
# summarization LLM call here creates intermittent multi-second stalls.
# max_context_tokens: 50000  # memory compressor triggers summarization above this
default_timeout: 120 # LLM policy timeout
wait_after_s: 0.3

desktop:
  _target_: hai_drivers.desktop.local.driver.LocalDesktopDriver
  # pyautogui captures native HiDPI screenshots on macOS (~3400 px wide on MBP);
  # clamp before upload. JPEG transcoding happens downstream via the agent's
  # `screenshot_media_type` (same chain HoloTab/OSWorld use).
  screenshot_max_width: 1920

