tools:
  - _target_: sagent.lib.tools.planning.UpdatePlan
  - _target_: sagent.lib.tools.desktop.WriteDesktop
    wait_after_s: ${wait_after_s}
  - _target_: sagent.lib.tools.desktop.ClickDesktop
    wait_after_s: ${wait_after_s}
  - _target_: sagent.lib.tools.desktop.DoubleClickDesktop
    wait_after_s: ${wait_after_s}
  - _target_: sagent.lib.tools.desktop.DragToDesktop
    wait_after_s: ${wait_after_s}
  - _target_: sagent.lib.tools.desktop.ScrollDesktop
    wait_after_s: ${wait_after_s}
  - _target_: sagent.lib.tools.desktop.MoveToDesktop
    wait_after_s: ${wait_after_s}
  - _target_: sagent.lib.tools.desktop.KeyDownDesktop
    wait_after_s: ${wait_after_s}
  - _target_: sagent.lib.tools.desktop.KeyUpDesktop
    wait_after_s: ${wait_after_s}
  - _target_: sagent.lib.tools.desktop.HotkeyDesktop
    wait_after_s: ${wait_after_s}
  - _target_: sagent.lib.tools.desktop.HoldAndTapKeyDesktop
    wait_after_s: ${wait_after_s}
  - _target_: sagent.lib.tools.communication.Answer
  - _target_: sagent.lib.tools.skill.LoadSkill

llm:
  _target_: hai_adapters.llm.LanguageModel
  default_timeout: ${default_timeout}
  chat_provider:
    _target_: hai_adapters.chat_provider_builder.build_chat_provider
    name: ${model}
    # Match cua_visual: this serial desktop loop gets no concurrency benefit
    # from the default sync->async bridge.
    max_parallel_requests: 1
  base_request:
    _target_: hai_protocols.base.BaseRequest
    temperature: 0.8
    reasoning_effort: medium
    max_completion_tokens: 2048

chat_mapper:
  _target_: sagent.lib.policy_chat_mappers.registry.build_chat_mapper
  coordinate_system: 0-1000
  mode: structured_note_multi
  prompt_path: "lib/agents/forest/prompts/structured_multi/local-desktop-2026-06-12.j2"
  events_mapper:
    _target_: sagent.core.events.mappers.StructuredEventMapperRegistry
    overrides:
      - _target_: sagent.core.events.mappers.ObservationEventMapper
        cursor_size: 40

agent:
  _target_: sagent.lib.agents.forest.forest.Forest
  name: Holo-Desktop-Holo3-1-35B-Multi
  max_steps: ${max_steps}
  max_time_s: ${max_time_s}
  max_images: ${max_images}
  policy_llm: ${llm}
  policy_chat_mapper: ${chat_mapper}
  tools: ${tools}
  callbacks: []
  services:
    desktop: ${desktop}
    # Client-supplied skills (~/.holo) are stocked here at session build time;
    # advertised as <available_skills> hints and loaded on demand via load_skill.
    skills:
      _target_: sagent.lib.services.skill_catalog.SkillCatalog
  # Model-facing transcode target: the driver always emits PNG; sagent's
  # media-type contextvar converts observations to this format before upload
  # (same chain HoloTab/OSWorld use).
  screenshot_media_type:
    _target_: hai_protocols.image.encoding.MediaType
    _args_: [image/jpeg]
